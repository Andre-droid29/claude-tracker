<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>Claude Usage</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: transparent; color: white; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
body { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 6px; }
.widget { width: 100%; max-width: 420px; background: rgba(20,20,20,0.88); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 12px 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: transform 0.15s ease; }
.widget.flash { transform: scale(1.02); }
.top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.title-row { display: flex; align-items: baseline; gap: 8px; }
.title { font-family: 'Fraunces', Georgia, serif; font-style: italic; font-weight: 500; font-size: 15px; letter-spacing: -0.01em; }
.plan-badge { font-size: 10px; color: #999; letter-spacing: 0.1em; font-weight: 600; }
.top-right { display: flex; align-items: center; gap: 6px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #444; transition: background 0.3s; flex-shrink: 0; }
.sync-dot.syncing { background: #60a5fa; }
.sync-dot.ok { background: #4ade80; }
.sync-dot.err { background: #f87171; }
.icon-btn { width: 26px; height: 26px; border-radius: 8px; background: rgba(255,255,255,0.06); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; color: #aaa; }
.icon-btn:active { background: rgba(255,255,255,0.12); }
.bars-row { display: flex; gap: 12px; align-items: center; }
.bar-block { flex: 1; min-width: 0; }
.bar-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
.bar-label { font-size: 10px; color: #888; letter-spacing: 0.08em; font-weight: 600; }
.bar-pct { font-size: 11px; color: #ddd; font-weight: 600; font-variant-numeric: tabular-nums; }
.bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; background: #d97757; border-radius: 99px; transition: width 0.5s ease; }
.bar-reset { font-size: 10px; color: #777; margin-top: 4px; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.plus-btn { width: 46px; height: 46px; border-radius: 14px; background: #d97757; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; flex-shrink: 0; box-shadow: 0 4px 12px rgba(217,119,87,0.4); transition: transform 0.1s ease; }
.plus-btn:active { transform: scale(0.93); }
.overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.7); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); display: none; align-items: flex-end; justify-content: center; cursor: pointer; }
.overlay.show { display: flex; }
.sheet { width: 100%; max-width: 420px; background: #1f1f1d; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 20px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s ease; cursor: default; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.sheet h3 { font-family: 'Fraunces', Georgia, serif; font-style: italic; font-weight: 500; font-size: 22px; color: white; }
.close-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.08); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; }
.section { margin-bottom: 18px; }
.section-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #999; font-weight: 600; margin-bottom: 8px; }
.plans { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.plan { padding: 10px 12px; border-radius: 12px; text-align: left; background: rgba(255,255,255,0.05); border: 1px solid transparent; cursor: pointer; color: white; font-family: inherit; }
.plan.active { background: rgba(217,119,87,0.15); border-color: #d97757; }
.plan-name { font-size: 14px; font-weight: 600; }
.plan-meta { font-size: 11px; color: #888; margin-top: 2px; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.toggle { padding: 5px 12px; border-radius: 99px; background: rgba(255,255,255,0.08); color: #999; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; border: none; cursor: pointer; }
.toggle.on { background: #d97757; color: white; }
.inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.input-group label { display: block; font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
.input-group input { width: 100%; padding: 9px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; font-size: 15px; outline: none; font-family: inherit; }
.input-group input:focus { border-color: rgba(217,119,87,0.5); }
.actions { display: flex; gap: 8px; margin-bottom: 14px; }
.action-btn { flex: 1; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: white; font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; font-family: inherit; }
.action-btn.danger { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #fca5a5; }
.info { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 10px; font-size: 11px; color: #888; line-height: 1.5; }
.info strong { color: #bbb; }
.sync-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; }
.sync-code-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.sync-code-display { flex: 1; font-size: 20px; font-weight: 700; letter-spacing: 0.2em; color: #d97757; background: rgba(217,119,87,0.08); border-radius: 8px; padding: 8px 12px; text-align: center; font-family: monospace; }
.copy-btn { padding: 8px 12px; border-radius: 8px; background: rgba(255,255,255,0.08); border: none; color: #aaa; font-size: 12px; cursor: pointer; font-family: inherit; }
.sync-input-row { display: flex; gap: 8px; }
.sync-input { flex: 1; padding: 9px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; font-size: 15px; outline: none; font-family: monospace; letter-spacing: 0.15em; text-transform: uppercase; }
.sync-input:focus { border-color: rgba(217,119,87,0.5); }
.sync-apply-btn { padding: 9px 14px; border-radius: 8px; background: #d97757; border: none; color: white; font-size: 13px; font-weight: 600; cursor: pointer; }
.sync-hint { font-size: 10px; color: #555; margin-top: 6px; text-align: center; }
</style>
</head>
<body>
<div class="widget" id="widget">
  <div class="top">
    <div class="title-row">
      <span class="title">Nutzung</span>
      <span class="plan-badge" id="plan-badge">PRO</span>
    </div>
    <div class="top-right">
      <div class="sync-dot" id="sync-dot"></div>
      <button class="icon-btn" id="open-settings" aria-label="Einstellungen">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </div>
  </div>
  <div class="bars-row">
    <div class="bar-block">
      <div class="bar-top"><span class="bar-label">5H</span><span class="bar-pct" id="pct-5h">0%</span></div>
      <div class="bar"><div class="bar-fill" id="fill-5h" style="width:0%"></div></div>
      <div class="bar-reset" id="reset-5h">inaktiv</div>
    </div>
    <div class="bar-block">
      <div class="bar-top"><span class="bar-label">WOCHE</span><span class="bar-pct" id="pct-wk">0%</span></div>
      <div class="bar"><div class="bar-fill" id="fill-wk" style="width:0%"></div></div>
      <div class="bar-reset" id="reset-wk">inaktiv</div>
    </div>
    <button class="plus-btn" id="add-btn" aria-label="Nachricht zaehlen">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-head">
      <h3>Einstellungen</h3>
      <button class="close-btn" id="close-settings"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
    </div>
    <div class="section">
      <div class="section-label">Sync-Code</div>
      <div class="sync-box">
        <div class="sync-code-row">
          <div class="sync-code-display" id="code-display">--------</div>
          <button class="copy-btn" id="copy-btn">Kopieren</button>
        </div>
        <div class="sync-input-row">
          <input class="sync-input" id="code-input" maxlength="8" placeholder="Code vom PC..." autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="sync-apply-btn" id="code-apply">OK</button>
        </div>
        <div class="sync-hint" id="sync-hint">Gleichen Code auf allen Geraeten eintragen</div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">Plan</div>
      <div class="plans" id="plans"></div>
    </div>
    <div class="section">
      <div class="toggle-row">
        <div class="section-label" style="margin-bottom:0">Custom-Limits</div>
        <button class="toggle" id="custom-toggle">AUS</button>
      </div>
      <div class="inputs">
        <div class="input-group"><label>5h-Limit</label><input type="number" id="input-5h" min="1" inputmode="numeric"></div>
        <div class="input-group"><label>Woche</label><input type="number" id="input-wk" min="1" inputmode="numeric"></div>
      </div>
    </div>
    <div class="actions">
      <button class="action-btn" id="undo-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14l-4-4 4-4"></path><path d="M5 10h11a4 4 0 0 1 0 8h-1"></path></svg>Letzte Undo</button>
      <button class="action-btn danger" id="reset-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"></path><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>Reset alle</button>
    </div>
    <div class="info"><strong>So funktioniert's:</strong> Tippe "+" nach jeder Nachricht. Gleicher Sync-Code auf PC und Handy = automatische Synchronisation. Daten liegen verschluesselt in der Cloud.</div>
  </div>
</div>

<script>
const PLANS={free:{name:'Free',fiveHour:10,weekly:50},pro:{name:'Pro',fiveHour:45,weekly:225},max5:{name:'Max 5x',fiveHour:225,weekly:1125},max20:{name:'Max 20x',fiveHour:900,weekly:4500}};
const SK='claude-tracker-v1', SYNCK='claude-tracker-sync';
const FH=5*3600000, SD=7*24*3600000;
let state={messages:[],plan:'pro',customLimits:{fiveHour:45,weekly:225},useCustom:false};
let syncCode='', pushTimer=null;
const dot=document.getElementById('sync-dot');

function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<8;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function initCode(){let s=localStorage.getItem(SYNCK);if(!s){s=genCode();localStorage.setItem(SYNCK,s);}syncCode=s;}
function setDot(s){dot.className='sync-dot'+(s?' '+s:'');}

async function pull(){
  try{
    setDot('syncing');
    const r=await fetch('/api/state?key='+syncCode);
    if(!r.ok){setDot('err');setTimeout(()=>setDot(''),3000);return;}
    const remote=await r.json();
    if(remote&&Array.isArray(remote.messages)){
      const merged=[...new Set([...state.messages,...remote.messages])].sort((a,b)=>a-b);
      state.messages=merged;
      if(remote.plan&&PLANS[remote.plan])state.plan=remote.plan;
      if(remote.customLimits)state.customLimits=remote.customLimits;
      if(typeof remote.useCustom==='boolean')state.useCustom=remote.useCustom;
      saveLocal();update();
    }
    setDot('ok');setTimeout(()=>setDot(''),2000);
  }catch(e){setDot('err');setTimeout(()=>setDot(''),3000);}
}

async function push(){
  try{
    setDot('syncing');
    const r=await fetch('/api/state?key='+syncCode,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)});
    setDot(r.ok?'ok':'err');setTimeout(()=>setDot(''),2000);
  }catch(e){setDot('err');setTimeout(()=>setDot(''),3000);}
}

function schedulePush(){clearTimeout(pushTimer);pushTimer=setTimeout(push,800);}
function loadLocal(){try{const r=localStorage.getItem(SK);if(r){const s=JSON.parse(r);if(Array.isArray(s.messages))state.messages=s.messages;if(s.plan&&PLANS[s.plan])state.plan=s.plan;if(s.customLimits)state.customLimits=s.customLimits;if(typeof s.useCustom==='boolean')state.useCustom=s.useCustom;}}catch(e){}}
function saveLocal(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
function saveState(){saveLocal();schedulePush();}

function fmt(ms){if(ms<=0)return'—';const m=Math.floor(ms/60000),d=Math.floor(m/1440),h=Math.floor((m%1440)/60),mn=m%60;if(d>0)return d+'d '+h+'h';if(h>0)return h+'h '+String(mn).padStart(2,'0')+'m';return mn+'m';}

function update(){
  const now=Date.now();
  const m5=state.messages.filter(t=>t>=now-FH);
  const mw=state.messages.filter(t=>t>=now-SD);
  const o5=m5.length?Math.min(...m5):null;
  const ow=mw.length?Math.min(...mw):null;
  const lim=state.useCustom?state.customLimits:PLANS[state.plan];
  const p5=Math.min(100,(m5.length/lim.fiveHour)*100);
  const pw=Math.min(100,(mw.length/lim.weekly)*100);
  document.getElementById('plan-badge').textContent=state.useCustom?'CUSTOM':PLANS[state.plan].name.toUpperCase();
  document.getElementById('pct-5h').textContent=Math.round(p5)+'%';
  document.getElementById('pct-wk').textContent=Math.round(pw)+'%';
  document.getElementById('fill-5h').style.width=p5+'%';
  document.getElementById('fill-wk').style.width=pw+'%';
  document.getElementById('reset-5h').textContent=o5?'Reset '+fmt(o5+FH-now):'inaktiv';
  document.getElementById('reset-wk').textContent=ow?'Reset '+fmt(ow+SD-now):'inaktiv';
}

function renderPlans(){
  const c=document.getElementById('plans');c.innerHTML='';
  Object.keys(PLANS).forEach(k=>{const p=PLANS[k],b=document.createElement('button');b.className='plan'+(!state.useCustom&&state.plan===k?' active':'');b.innerHTML='<div class="plan-name">'+p.name+'</div><div class="plan-meta">'+p.fiveHour+'/5h &middot; '+p.weekly+'/Wo</div>';b.onclick=()=>{state.plan=k;state.useCustom=false;saveState();renderPlans();renderToggle();update();};c.appendChild(b);});
}
function renderToggle(){const t=document.getElementById('custom-toggle');t.textContent=state.useCustom?'AKTIV':'AUS';t.className='toggle'+(state.useCustom?' on':'');}
function renderInputs(){document.getElementById('input-5h').value=state.customLimits.fiveHour;document.getElementById('input-wk').value=state.customLimits.weekly;}
function renderCode(){document.getElementById('code-display').textContent=syncCode;}
function flash(){const w=document.getElementById('widget');w.classList.add('flash');setTimeout(()=>w.classList.remove('flash'),250);}

document.getElementById('add-btn').onclick=()=>{state.messages.push(Date.now());saveState();flash();update();};
document.getElementById('open-settings').onclick=()=>{renderPlans();renderToggle();renderInputs();renderCode();document.getElementById('overlay').classList.add('show');};
document.getElementById('close-settings').onclick=()=>document.getElementById('overlay').classList.remove('show');
document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')document.getElementById('overlay').classList.remove('show');};
document.getElementById('custom-toggle').onclick=()=>{state.useCustom=!state.useCustom;saveState();renderPlans();renderToggle();update();};
document.getElementById('input-5h').oninput=e=>{state.customLimits.fiveHour=Math.max(1,parseInt(e.target.value)||1);saveState();update();};
document.getElementById('input-wk').oninput=e=>{state.customLimits.weekly=Math.max(1,parseInt(e.target.value)||1);saveState();update();};
document.getElementById('undo-btn').onclick=()=>{if(!state.messages.length)return;state.messages.pop();saveState();update();};
document.getElementById('reset-btn').onclick=()=>{if(confirm('Alle Daten loeschen?')){state.messages=[];saveState();update();}};
document.getElementById('copy-btn').onclick=function(){navigator.clipboard&&navigator.clipboard.writeText(syncCode);this.textContent='Kopiert!';setTimeout(()=>this.textContent='Kopieren',1500);};
document.getElementById('code-apply').onclick=()=>{
  const v=document.getElementById('code-input').value.trim().toUpperCase();
  if(v.length!==8){document.getElementById('sync-hint').textContent='Code = 8 Zeichen';return;}
  syncCode=v;localStorage.setItem(SYNCK,v);renderCode();document.getElementById('code-input').value='';
  document.getElementById('sync-hint').textContent='Lade Daten...';
  pull().then(()=>document.getElementById('sync-hint').textContent='Synchronisiert!');
};

initCode();loadLocal();pull().then(()=>update());update();
setInterval(update,1000);setInterval(pull,30000);
</script>
</body>
</html>
